<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .sw { fill:#07182d; stroke:#00a0d2; stroke-width:2; rx:10; }
      .host { fill:#ffffff; stroke:#5d6f7d; stroke-width:2; }
      .lbl { fill:#ffffff; font-size:16px; font-weight:bold; text-anchor:middle; }
      .hostlbl { fill:#17232f; font-size:14px; font-weight:bold; text-anchor:middle; }
      .port { fill:#5d6f7d; font-size:11px; }
      .bundle { fill:#006da8; font-size:13px; font-weight:bold; text-anchor:middle; }
      .defect { fill:#b42318; font-size:12px; font-weight:bold; text-anchor:middle; }
      .link { stroke:#5d6f7d; stroke-width:2.5; }
      .vlan { fill:#14795f; font-size:12px; text-anchor:middle; }
    </style>
  </defs>
  <text x="490" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#17232f">ENCOR-ETHERCHANNEL — LACP / PAgP Bundle Topology</text>

  <!-- Po1 links DIST-1 <-> DIST-2 -->
  <line class="link" x1="280" y1="135" x2="700" y2="135"/>
  <line class="link" x1="280" y1="165" x2="700" y2="165"/>
  <text class="bundle" x="490" y="120">Po1 — LACP active/active</text>
  <text class="defect" x="490" y="195">Defect: DIST-2 Et0/1 allowed-VLAN mismatch (suspended member)</text>
  <text class="port" x="292" y="131">Et0/0</text>
  <text class="port" x="292" y="161">Et0/1</text>
  <text class="port" x="648" y="131">Et0/0</text>
  <text class="port" x="648" y="161">Et0/1</text>

  <!-- DIST-1 -->
  <rect class="sw" x="120" y="110" width="160" height="64" rx="10"/>
  <text class="lbl" x="200" y="148">DIST-1</text>
  <!-- DIST-2 -->
  <rect class="sw" x="700" y="110" width="160" height="64" rx="10"/>
  <text class="lbl" x="780" y="148">DIST-2</text>

  <!-- Po11 DIST-1 <-> ACCESS-1 -->
  <line class="link" x1="185" y1="174" x2="185" y2="330"/>
  <line class="link" x1="215" y1="174" x2="215" y2="330"/>
  <text class="bundle" x="92" y="250">Po11 — PAgP</text>
  <text class="defect" x="92" y="268">Defect: auto/auto</text>
  <text class="defect" x="92" y="284">never bundles</text>
  <text class="port" x="222" y="192">Et0/2-3</text>
  <text class="port" x="222" y="324">Et0/0-1</text>

  <!-- Po12 DIST-2 <-> ACCESS-2 -->
  <line class="link" x1="765" y1="174" x2="765" y2="330"/>
  <line class="link" x1="795" y1="174" x2="795" y2="330"/>
  <text class="bundle" x="892" y="250">Po12 — LACP</text>
  <text class="defect" x="892" y="268">Defect: mode on</text>
  <text class="defect" x="892" y="284">vs LACP active</text>
  <text class="port" x="702" y="192">Et0/2-3</text>
  <text class="port" x="702" y="324">Et0/0-1</text>

  <!-- ACCESS-1 -->
  <rect class="sw" x="120" y="330" width="160" height="64" rx="10"/>
  <text class="lbl" x="200" y="368">ACCESS-1</text>
  <!-- ACCESS-2 -->
  <rect class="sw" x="700" y="330" width="160" height="64" rx="10"/>
  <text class="lbl" x="780" y="368">ACCESS-2</text>

  <!-- Hosts -->
  <line class="link" x1="200" y1="394" x2="200" y2="470"/>
  <line class="link" x1="780" y1="394" x2="780" y2="470"/>
  <text class="port" x="208" y="416">Et1/0</text>
  <text class="port" x="788" y="416">Et1/0</text>
  <rect class="host" x="140" y="470" width="120" height="48" rx="8"/>
  <text class="hostlbl" x="200" y="490">USER-A</text>
  <text class="vlan" x="200" y="508">VLAN 10 · 10.10.0.10</text>
  <rect class="host" x="720" y="470" width="120" height="48" rx="8"/>
  <text class="hostlbl" x="780" y="490">USER-B</text>
  <text class="vlan" x="780" y="508">VLAN 10 · 10.10.0.20</text>

  <text class="vlan" x="490" y="540">VLANs: 10 USERS · 30 SERVERS · 100 NET-MGMT · 999 native — all inter-switch links are 802.1Q trunks inside the bundles</text>
</svg>
