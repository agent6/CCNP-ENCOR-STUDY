<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">ENCOR NETCONF RESTCONF lab topology</title>
  <desc id="desc">Automation workstation connected to a managed IOS XE router with a routed app-server LAN.</desc>
  <defs>
    <style>
      .bg{fill:#f6f9fb}.box{fill:#fff;stroke:#d3e0e8;stroke-width:2}.router{fill:#0b243b}.host{fill:#00a0d2}.server{fill:#14795f}.api{stroke:#00a0d2;stroke-width:5;stroke-dasharray:10 8;fill:none}.link{stroke:#667b8a;stroke-width:4;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;fill:#17232f}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#526676}.area{font-size:15px;font-weight:700;fill:#244558}.pill{fill:#e9f6fb;stroke:#afd8e8}
    </style>
  </defs>
  <rect class="bg" width="1180" height="620"/>
  <rect class="box" x="36" y="54" width="1108" height="510" rx="8"/>
  <text class="txt area" x="58" y="88">ENCOR 4.6: Configure and verify NETCONF and RESTCONF on IOS XE</text>

  <path class="link" d="M250 305 L510 305"/>
  <path class="link" d="M670 305 L930 305"/>
  <path class="api" d="M250 240 C360 110 525 110 590 230"/>
  <path class="api" d="M250 370 C360 500 525 500 590 380"/>

  <g transform="translate(140 270)">
    <rect class="host" width="110" height="70" rx="8"/>
    <text class="txt label" x="55" y="98" text-anchor="middle">AUTOMATION</text>
    <text class="txt small" x="55" y="118" text-anchor="middle">10.60.60.10</text>
  </g>
  <g transform="translate(510 245)">
    <rect class="router" width="160" height="120" rx="12"/>
    <text class="txt label" x="80" y="148" text-anchor="middle">R1-MANAGED</text>
    <text class="txt small" x="80" y="168" text-anchor="middle">NETCONF / RESTCONF target</text>
  </g>
  <g transform="translate(930 270)">
    <rect class="server" width="115" height="70" rx="8"/>
    <text class="txt label" x="58" y="98" text-anchor="middle">APP-SERVER</text>
    <text class="txt small" x="58" y="118" text-anchor="middle">10.70.70.10</text>
  </g>

  <rect class="pill" x="307" y="281" width="116" height="30" rx="15"/>
  <text class="txt small" x="365" y="301" text-anchor="middle">10.60.60/24</text>
  <rect class="pill" x="748" y="281" width="116" height="30" rx="15"/>
  <text class="txt small" x="806" y="301" text-anchor="middle">10.70.70/24</text>
  <rect class="pill" x="331" y="160" width="116" height="30" rx="15"/>
  <text class="txt small" x="389" y="180" text-anchor="middle">NETCONF 830</text>
  <rect class="pill" x="331" y="430" width="116" height="30" rx="15"/>
  <text class="txt small" x="389" y="450" text-anchor="middle">RESTCONF 443</text>

  <text class="txt small" x="58" y="522">Students enable SSH, AAA/local credentials, NETCONF over SSH, HTTPS, RESTCONF, and YANG-modeled operational/configuration access.</text>
  <text class="txt small" x="58" y="546">Verification uses device CLI, TCP reachability, RESTCONF HTTP status codes, NETCONF sessions/capabilities, and post-change routing state.</text>
</svg>
