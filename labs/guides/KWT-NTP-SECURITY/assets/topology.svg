<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">NTP Security CML topology</title>
  <desc id="desc">Two IOL routers. R1 uses the INTERNET router loopback as an authenticated NTP server.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#092033" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="980" height="520" rx="8" fill="#f4f7f9"/>
  <g stroke="#526779" stroke-width="4" stroke-linecap="round">
    <line x1="318" y1="260" x2="662" y2="260"/>
  </g>
  <g fill="#263946" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    <text x="392" y="238">192.0.2.0/24</text>
    <text x="326" y="288">E0/0 .100</text>
    <text x="558" y="288">E0/0 .1</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="138" y="198" width="210" height="124" rx="8" fill="#07233b"/>
    <rect x="632" y="198" width="230" height="124" rx="8" fill="#005f82"/>
    <rect x="664" y="72" width="166" height="72" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="243" y="238" fill="#ffffff" font-size="26" font-weight="800">R1</text>
    <text x="243" y="269" fill="#b8ecff" font-size="15">NTP client</text>
    <text x="243" y="296" fill="#b8ecff" font-size="15">192.0.2.100/24</text>
    <text x="747" y="238" fill="#ffffff" font-size="26" font-weight="800">INTERNET</text>
    <text x="747" y="269" fill="#c5f2ff" font-size="15">NTP master</text>
    <text x="747" y="296" fill="#c5f2ff" font-size="15">192.0.2.1/24</text>
    <text x="747" y="104" fill="#17232f" font-size="22" font-weight="800">Loopback0</text>
    <text x="747" y="128" fill="#5c6f7d" font-size="15">1.1.1.1/32</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#263946">
    <rect x="260" y="38" width="460" height="36" rx="6" fill="#e9f8f3" stroke="#a6e5d3"/>
    <text x="490" y="61" text-anchor="middle" font-weight="700">Starting state: IP reachability and OSPF are configured.</text>
    <rect x="244" y="390" width="492" height="48" rx="6" fill="#e8f7fc" stroke="#8dd7ef"/>
    <text x="490" y="419" text-anchor="middle">Add NTP master/client, MD5 authentication, and access groups.</text>
  </g>
</svg>
