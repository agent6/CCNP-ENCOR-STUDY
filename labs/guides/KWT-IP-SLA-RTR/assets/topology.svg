<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">IP SLA Response Time Reporter topology</title>
  <desc id="desc">Two IOL routers connected on 203.0.113.0/24, with two IOL-L2 switches keeping each router LAN interface up.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#092033" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1080" height="560" rx="8" fill="#f4f7f9"/>
  <g stroke="#526779" stroke-width="4" stroke-linecap="round">
    <line x1="335" y1="260" x2="745" y2="260"/>
    <line x1="250" y1="340" x2="250" y2="448"/>
    <line x1="830" y1="340" x2="830" y2="448"/>
  </g>
  <g fill="#263946" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    <text x="450" y="238">203.0.113.0/24</text>
    <text x="348" y="288">R1 E0/1 .1</text>
    <text x="610" y="288">R2 E0/0 .2</text>
    <text x="266" y="402">10.1.1.0/24</text>
    <text x="846" y="402">10.2.2.0/24</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="160" y="198" width="180" height="124" rx="8" fill="#07233b"/>
    <rect x="740" y="198" width="180" height="124" rx="8" fill="#005f82"/>
    <rect x="126" y="448" width="248" height="70" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
    <rect x="706" y="448" width="248" height="70" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="250" y="238" fill="#ffffff" font-size="26" font-weight="800">R1</text>
    <text x="250" y="270" fill="#b8ecff" font-size="15">IP SLA source</text>
    <text x="250" y="296" fill="#b8ecff" font-size="15">UDP jitter operation 1</text>
    <text x="830" y="238" fill="#ffffff" font-size="26" font-weight="800">R2</text>
    <text x="830" y="270" fill="#c5f2ff" font-size="15">IP SLA responder</text>
    <text x="830" y="296" fill="#c5f2ff" font-size="15">Target 203.0.113.2</text>
    <text x="250" y="478" fill="#17232f" font-size="20" font-weight="800">SW-R1-LAN</text>
    <text x="250" y="502" fill="#5c6f7d" font-size="14">keeps R1 LAN up</text>
    <text x="830" y="478" fill="#17232f" font-size="20" font-weight="800">SW-R2-LAN</text>
    <text x="830" y="502" fill="#5c6f7d" font-size="14">keeps R2 LAN up</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#263946">
    <rect x="300" y="42" width="480" height="36" rx="6" fill="#e9f8f3" stroke="#a6e5d3"/>
    <text x="540" y="65" text-anchor="middle" font-weight="700">Starting state: IP addressing and OSPF reachability are configured.</text>
    <rect x="232" y="104" width="616" height="46" rx="6" fill="#e8f7fc" stroke="#8dd7ef"/>
    <text x="540" y="132" text-anchor="middle">Configure R2 responder, then R1 UDP jitter with G.729A, ToS 184, and frequency 5.</text>
  </g>
</svg>
