<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">ENCOR CoPP topology</title>
  <desc id="desc">ADMIN-PC and ATTACK-PC connect through SW-ACCESS to R1-EDGE. R1-EDGE connects to R2-WAN and APP-SERVER. CoPP protects traffic destined to R1-EDGE control plane while data-plane traffic continues to APP-SERVER.</desc>
  <rect width="1180" height="620" fill="#f6f9fb"/>
  <text x="50" y="60" fill="#0b243b" font-family="Arial, sans-serif" font-size="30" font-weight="700">ENCOR-COPP</text>
  <text x="50" y="92" fill="#415466" font-family="Arial, sans-serif" font-size="16">Control Plane Policing protects router-destined traffic. Transit HTTP/ICMP to APP-SERVER stays in the data plane.</text>

  <rect x="60" y="150" width="300" height="330" fill="#ffffff" stroke="#c9d7e0" stroke-width="2"/>
  <text x="90" y="185" fill="#0b243b" font-family="Arial, sans-serif" font-size="18" font-weight="700">Access VLANs</text>
  <rect x="105" y="230" width="130" height="72" rx="4" fill="#e7f6fd" stroke="#18a3d7" stroke-width="2"/>
  <text x="124" y="260" fill="#0b243b" font-family="Arial, sans-serif" font-size="15" font-weight="700">ADMIN-PC</text>
  <text x="121" y="282" fill="#415466" font-family="Arial, sans-serif" font-size="13">10.10.10.10</text>
  <rect x="105" y="350" width="130" height="72" rx="4" fill="#fff3e5" stroke="#f28c28" stroke-width="2"/>
  <text x="120" y="380" fill="#0b243b" font-family="Arial, sans-serif" font-size="15" font-weight="700">ATTACK-PC</text>
  <text x="121" y="402" fill="#415466" font-family="Arial, sans-serif" font-size="13">10.10.20.10</text>
  <rect x="260" y="280" width="75" height="92" rx="4" fill="#f3f7fa" stroke="#7a8b99" stroke-width="2"/>
  <text x="274" y="315" fill="#0b243b" font-family="Arial, sans-serif" font-size="13" font-weight="700">SW-</text>
  <text x="271" y="335" fill="#0b243b" font-family="Arial, sans-serif" font-size="13" font-weight="700">ACCESS</text>

  <rect x="500" y="235" width="160" height="120" rx="5" fill="#0b243b" stroke="#18a3d7" stroke-width="3"/>
  <text x="533" y="285" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">R1-EDGE</text>
  <text x="529" y="315" fill="#b8d3e1" font-family="Arial, sans-serif" font-size="13">CoPP target</text>
  <text x="520" y="335" fill="#b8d3e1" font-family="Arial, sans-serif" font-size="13">Lo0 1.1.1.1</text>

  <rect x="820" y="170" width="145" height="90" rx="5" fill="#ffffff" stroke="#7a8b99" stroke-width="2"/>
  <text x="853" y="210" fill="#0b243b" font-family="Arial, sans-serif" font-size="17" font-weight="700">R2-WAN</text>
  <text x="844" y="232" fill="#415466" font-family="Arial, sans-serif" font-size="13">OSPF neighbor</text>

  <rect x="820" y="370" width="160" height="90" rx="5" fill="#ffffff" stroke="#7a8b99" stroke-width="2"/>
  <text x="849" y="410" fill="#0b243b" font-family="Arial, sans-serif" font-size="17" font-weight="700">APP-SERVER</text>
  <text x="851" y="432" fill="#415466" font-family="Arial, sans-serif" font-size="13">10.30.30.10</text>

  <line x1="235" y1="266" x2="260" y2="305" stroke="#7a8b99" stroke-width="3"/>
  <line x1="235" y1="386" x2="260" y2="350" stroke="#7a8b99" stroke-width="3"/>
  <line x1="335" y1="326" x2="500" y2="295" stroke="#18a3d7" stroke-width="4"/>
  <line x1="660" y1="270" x2="820" y2="215" stroke="#7a8b99" stroke-width="4"/>
  <line x1="660" y1="330" x2="820" y2="415" stroke="#7a8b99" stroke-width="4"/>

  <path d="M500 202 C450 192 430 225 458 252" fill="none" stroke="#d84b2a" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="374" y="184" fill="#d84b2a" font-family="Arial, sans-serif" font-size="15" font-weight="700">Router-destined SSH/ICMP</text>
  <text x="384" y="204" fill="#d84b2a" font-family="Arial, sans-serif" font-size="15" font-weight="700">matches CoPP classes</text>

  <path d="M205 438 C410 548 720 525 895 460" fill="none" stroke="#268a54" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="420" y="540" fill="#268a54" font-family="Arial, sans-serif" font-size="15" font-weight="700">Transit traffic to APP-SERVER should continue</text>

  <rect x="735" y="82" width="360" height="74" rx="4" fill="#ffffff" stroke="#c9d7e0" stroke-width="2"/>
  <text x="758" y="113" fill="#0b243b" font-family="Arial, sans-serif" font-size="15" font-weight="700">CoPP policy scope</text>
  <text x="758" y="136" fill="#415466" font-family="Arial, sans-serif" font-size="14">Apply under control-plane input on R1-EDGE.</text>
</svg>
