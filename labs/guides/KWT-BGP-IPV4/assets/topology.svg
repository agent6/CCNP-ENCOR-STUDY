<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">BGP for IPv4 CML topology</title>
  <desc id="desc">Two IOL routers connected for eBGP over 198.51.100.0/30 with two IOL-L2 LAN switches for advertised networks.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#092033" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1040" height="540" rx="8" fill="#f4f7f9"/>
  <g stroke="#526779" stroke-width="4" stroke-linecap="round">
    <line x1="330" y1="252" x2="710" y2="252"/>
    <line x1="230" y1="330" x2="230" y2="438"/>
    <line x1="810" y1="330" x2="810" y2="438"/>
  </g>
  <g fill="#263946" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    <text x="426" y="228">198.51.100.0/30</text>
    <text x="340" y="280">E0/1 .1</text>
    <text x="616" y="280">E0/0 .2</text>
    <text x="246" y="392">192.0.2.0/24</text>
    <text x="826" y="392">203.0.113.0/24</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="140" y="190" width="180" height="124" rx="8" fill="#07233b"/>
    <rect x="720" y="190" width="180" height="124" rx="8" fill="#005f82"/>
    <rect x="106" y="438" width="248" height="70" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
    <rect x="686" y="438" width="248" height="70" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="230" y="230" fill="#ffffff" font-size="26" font-weight="800">R1</text>
    <text x="230" y="262" fill="#b8ecff" font-size="15">AS 64500</text>
    <text x="230" y="288" fill="#b8ecff" font-size="15">Advertise 192.0.2.0/24</text>
    <text x="810" y="230" fill="#ffffff" font-size="26" font-weight="800">R2</text>
    <text x="810" y="262" fill="#c5f2ff" font-size="15">AS 64495</text>
    <text x="810" y="288" fill="#c5f2ff" font-size="15">Advertise 203.0.113.0/24</text>
    <text x="230" y="468" fill="#17232f" font-size="20" font-weight="800">SW-R1-LAN</text>
    <text x="230" y="492" fill="#5c6f7d" font-size="14">keeps R1 LAN up</text>
    <text x="810" y="468" fill="#17232f" font-size="20" font-weight="800">SW-R2-LAN</text>
    <text x="810" y="492" fill="#5c6f7d" font-size="14">keeps R2 LAN up</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#263946">
    <rect x="304" y="42" width="432" height="36" rx="6" fill="#e9f8f3" stroke="#a6e5d3"/>
    <text x="520" y="65" text-anchor="middle" font-weight="700">Starting state: IP addressing only. Configure eBGP during the lab.</text>
    <rect x="304" y="100" width="432" height="44" rx="6" fill="#e8f7fc" stroke="#8dd7ef"/>
    <text x="520" y="127" text-anchor="middle">Direct eBGP neighbors exchange one IPv4 network per AS.</text>
  </g>
</svg>
