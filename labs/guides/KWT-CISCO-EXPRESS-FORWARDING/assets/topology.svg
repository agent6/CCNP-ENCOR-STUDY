<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="540" viewBox="0 0 1040 540" role="img" aria-labelledby="title desc">
  <title id="title">Cisco Express Forwarding CML topology</title>
  <desc id="desc">Two IOL routers connected through 203.0.113.0/24 with IOL-L2 switches on the 198.51.100.0/24 and 192.0.2.0/24 LANs.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#092033" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1040" height="540" rx="8" fill="#f4f7f9"/>
  <g stroke="#526779" stroke-width="4" stroke-linecap="round">
    <line x1="238" y1="260" x2="380" y2="260"/>
    <line x1="500" y1="260" x2="640" y2="260"/>
    <line x1="760" y1="260" x2="902" y2="260"/>
  </g>
  <g fill="#263946" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">
    <text x="258" y="238">198.51.100.0/24</text>
    <text x="516" y="238">203.0.113.0/24</text>
    <text x="780" y="238">192.0.2.0/24</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="208" width="170" height="104" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
    <rect x="350" y="198" width="180" height="124" rx="8" fill="#07233b"/>
    <rect x="610" y="198" width="180" height="124" rx="8" fill="#005f82"/>
    <rect x="790" y="208" width="170" height="104" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="165" y="248" fill="#17232f" font-size="24" font-weight="800">SW1</text>
    <text x="165" y="278" fill="#5c6f7d" font-size="14">LAN switch</text>
    <text x="440" y="238" fill="#ffffff" font-size="26" font-weight="800">R1</text>
    <text x="440" y="270" fill="#b8ecff" font-size="15">CEF inspection</text>
    <text x="440" y="296" fill="#b8ecff" font-size="15">E0/2 to R2</text>
    <text x="700" y="238" fill="#ffffff" font-size="26" font-weight="800">R2</text>
    <text x="700" y="270" fill="#c5f2ff" font-size="15">OSPF neighbor</text>
    <text x="700" y="296" fill="#c5f2ff" font-size="15">192.0.2.0/24 attached</text>
    <text x="875" y="248" fill="#17232f" font-size="24" font-weight="800">SW2</text>
    <text x="875" y="278" fill="#5c6f7d" font-size="14">LAN switch</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#263946">
    <rect x="266" y="50" width="508" height="36" rx="6" fill="#e9f8f3" stroke="#a6e5d3"/>
    <text x="520" y="73" text-anchor="middle" font-weight="700">Starting state: OSPF is converged and CEF is enabled by default.</text>
    <rect x="244" y="112" width="552" height="46" rx="6" fill="#e8f7fc" stroke="#8dd7ef"/>
    <text x="520" y="140" text-anchor="middle">Inspect R1's FIB and adjacency detail for next-hop 203.0.113.2.</text>
  </g>
</svg>
