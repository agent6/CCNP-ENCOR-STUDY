<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">OSPF Route Summarization CML topology</title>
  <desc id="desc">Three IOL routers with R2 as an OSPF ABR and R3 as an ASBR redistributing EIGRP into OSPF.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#092033" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1120" height="600" rx="8" fill="#f4f7f9"/>
  <g stroke="#526779" stroke-width="4" stroke-linecap="round">
    <line x1="275" y1="280" x2="520" y2="280"/>
    <line x1="600" y1="280" x2="845" y2="280"/>
    <line x1="230" y1="360" x2="230" y2="468"/>
    <line x1="890" y1="360" x2="890" y2="468"/>
  </g>
  <g fill="#263946" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">
    <text x="340" y="258">172.16.1.0/30</text>
    <text x="672" y="258">192.168.1.0/30</text>
    <text x="246" y="420">10.1.1.0/24</text>
    <text x="906" y="420">10.2.2.0/24</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="140" y="220" width="180" height="124" rx="8" fill="#07233b"/>
    <rect x="470" y="220" width="180" height="124" rx="8" fill="#005f82"/>
    <rect x="800" y="220" width="180" height="124" rx="8" fill="#07233b"/>
    <rect x="106" y="468" width="248" height="70" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
    <rect x="766" y="468" width="248" height="70" rx="8" fill="#ffffff" stroke="#cbdbe5"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="230" y="260" fill="#ffffff" font-size="26" font-weight="800">R1</text>
    <text x="230" y="292" fill="#b8ecff" font-size="15">Area 0</text>
    <text x="230" y="318" fill="#b8ecff" font-size="15">Route observer</text>
    <text x="560" y="260" fill="#ffffff" font-size="26" font-weight="800">R2</text>
    <text x="560" y="292" fill="#c5f2ff" font-size="15">ABR: Area 0 / Area 1</text>
    <text x="560" y="318" fill="#c5f2ff" font-size="15">172.17.0.0/16 loopbacks</text>
    <text x="890" y="260" fill="#ffffff" font-size="26" font-weight="800">R3</text>
    <text x="890" y="292" fill="#b8ecff" font-size="15">OSPF ASBR</text>
    <text x="890" y="318" fill="#b8ecff" font-size="15">EIGRP 172.18.0.0/16 loopbacks</text>
    <text x="230" y="498" fill="#17232f" font-size="20" font-weight="800">SW-R1-LAN</text>
    <text x="230" y="522" fill="#5c6f7d" font-size="14">keeps R1 LAN up</text>
    <text x="890" y="498" fill="#17232f" font-size="20" font-weight="800">SW-R3-LAN</text>
    <text x="890" y="522" fill="#5c6f7d" font-size="14">keeps R3 LAN up</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#263946">
    <rect x="280" y="38" width="560" height="36" rx="6" fill="#e9f8f3" stroke="#a6e5d3"/>
    <text x="560" y="61" text-anchor="middle" font-weight="700">Starting state: OSPF and EIGRP are converged, but routes are not summarized.</text>
    <rect x="254" y="94" width="612" height="50" rx="6" fill="#e8f7fc" stroke="#8dd7ef"/>
    <text x="560" y="124" text-anchor="middle">Configure external summarization on R3 and inter-area summarization on R2.</text>
  </g>
</svg>
