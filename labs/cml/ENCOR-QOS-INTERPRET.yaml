    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname BR-RTR
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      !
      interface Ethernet0/0
       description WAN link to WAN-RTR Ethernet0/1 - return QoS should be attached output here
       ip address 10.255.0.6 255.255.255.252
       no shutdown
      !
      interface Ethernet0/1
       description Branch user LAN - DEFECT return QoS attached output on wrong interface
       ip address 10.20.20.1 255.255.255.0
       no shutdown
       service-policy output BR-RETURN-QOS
      !
      interface Ethernet0/2
       description Branch server LAN
       ip address 10.20.10.1 255.255.255.0
       no shutdown
      !
      ip route 0.0.0.0 0.0.0.0 10.255.0.5
      !
      ip access-list extended RTP-PORTS
       permit udp any any range 16384 32767
      !
      class-map match-all RETURN-VOICE
       match dscp ef
       match access-group name RTP-PORTS
      class-map match-any RETURN-DATA
       match dscp af21
      class-map match-any RETURN-SCAVENGER
       match dscp cs1
      !
      policy-map BR-RETURN-QOS
       class RETURN-VOICE
        bandwidth 512
       class RETURN-DATA
        bandwidth 768
       class RETURN-SCAVENGER
        police 32000 conform-action transmit exceed-action drop
       class class-default
        fair-queue
      !
      interface Ethernet0/1
       service-policy output BR-RETURN-QOS
      !
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
