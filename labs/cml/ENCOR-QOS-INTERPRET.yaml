  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname HQ-RTR
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      !
      interface Ethernet0/0
       description WAN link to WAN-RTR Ethernet0/0 - QoS egress policy belongs here
       ip address 10.255.0.2 255.255.255.252
       no shutdown
       service-policy output WAN-EDGE-OUT
      !
      interface Ethernet0/1
       description HQ voice endpoint LAN
       ip address 10.10.10.1 255.255.255.0
       no shutdown
       service-policy input MARK-HQ-LAN
      !
      interface Ethernet0/2
       description HQ data endpoint LAN
       ip address 10.10.20.1 255.255.255.0
       no shutdown
       service-policy input MARK-HQ-LAN
      !
      ip route 0.0.0.0 0.0.0.0 10.255.0.1
      !
      ip access-list extended QOS-CRITICAL-DATA
       permit tcp 10.10.20.0 0.0.0.255 host 10.20.10.10 eq 443
       permit tcp 10.10.20.0 0.0.0.255 host 10.20.10.10 eq 22
      !
      class-map match-any VOICE-EF
       match dscp ef
      class-map match-any VIDEO-AF41
       match dscp af41
      class-map match-any CRITICAL-DATA
       match access-group name QOS-CRITICAL-DATA
      class-map match-any SCAVENGER
       match dscp cs1
      !
      policy-map MARK-HQ-LAN
       class VOICE-EF
        set dscp ef
       class CRITICAL-DATA
        set dscp af21
       class class-default
        set dscp default
      !
      policy-map WAN-EDGE-OUT
       class VOICE-EF
        priority 512
       class VIDEO-AF41
        bandwidth 1024
       class CRITICAL-DATA
        bandwidth 768
       class SCAVENGER
        police 64000 conform-action transmit exceed-action drop
       class class-default
        fair-queue
      !
      interface Ethernet0/0
       service-policy output WAN-EDGE-OUT
      interface Ethernet0/1
       service-policy input MARK-HQ-LAN
      interface Ethernet0/2
       service-policy input MARK-HQ-LAN
      !
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
