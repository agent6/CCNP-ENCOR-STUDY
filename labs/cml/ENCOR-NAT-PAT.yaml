      hostname R2-INET
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      !
      interface Ethernet0/0
       description Outside link to R1-NAT Ethernet0/2
       ip address 203.0.113.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description Outside client LAN
       ip address 198.51.100.1 255.255.255.0
       no shutdown
      !
      interface Loopback0
       description Simulated public service
       ip address 8.8.8.8 255.255.255.255
       no shutdown
      !
      ip route 203.0.113.20 255.255.255.255 203.0.113.2 name STATIC_NAT_WEB_GLOBAL
      ip route 203.0.113.30 255.255.255.255 203.0.113.2 name STATIC_PAT_APP_GLOBAL
      ip route 203.0.113.40 255.255.255.248 203.0.113.2 name DYNAMIC_NAT_POOL_GLOBALS
      !
      ! R2 intentionally has no route to RFC1918 inside networks.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
