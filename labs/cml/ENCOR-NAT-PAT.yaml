- boot_disk_size: 
  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname hq-app
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.10.30.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.10.30.1
      while true; do
        printf "HTTP/1.1 200 OK\r\nContent-Length: 7\r\n\r\nhq-app\n" | nc -l -p 8080
      done &

      echo "hq-app" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       hq-app localhost
      ::1             localhost
      EOF
