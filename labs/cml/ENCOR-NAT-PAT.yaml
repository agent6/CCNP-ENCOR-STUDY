  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1-NAT
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      !
      interface Ethernet0/0
       description Inside user LAN - HQ-USER
       ip address 10.10.10.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description Inside web server LAN - HQ-WEB
       ip address 10.10.20.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/2
       description Outside link to R2-INET Ethernet0/0
       ip address 203.0.113.2 255.255.255.0
       no shutdown
      !
      interface Ethernet0/3
       description Inside app server LAN - HQ-APP
       ip address 10.10.30.1 255.255.255.0
       no shutdown
      !
      interface Loopback0
       description Edge router identity
       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      ip route 0.0.0.0 0.0.0.0 203.0.113.1
      !
      ! NAT is intentionally absent. Configure NAT/PAT during the lab.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
