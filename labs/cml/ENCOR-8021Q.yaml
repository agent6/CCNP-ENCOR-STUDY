lab:
  description: CCNP ENCOR custom lab for deterministic 802.1Q trunking, VLAN pruning,
    and trunk defect troubleshooting using CML IOL-L2 switches.
  notes: Switches use CML IOL-L2 (node definition ioll2-xe). No routers are used in
    this lab. Alpine hosts provide endpoint MAC and ping targets.
  title: ENCOR-8021Q
  version: 0.3.0
