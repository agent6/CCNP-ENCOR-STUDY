  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname CORE-1
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      vtp mode transparent
      !
      spanning-tree mode rapid-pvst
      spanning-tree extend system-id
      !
      vlan 10
       name ENG-USERS
      vlan 20
       name FIN-USERS
      vlan 30
       name APP-SERVERS
      vlan 40
       name DB-SERVERS
      vlan 100
       name NET-MGMT
      vlan 999
       name NATIVE-BLACKHOLE
      !
      ip routing
      !
      interface Vlan10
       description ENG-USERS default gateway
       ip address 10.10.0.1 255.255.255.0
       no shutdown
      !
      interface Vlan20
       description FIN-USERS default gateway
       ip address 10.20.0.1 255.255.255.0
       no shutdown
      !
      interface Vlan30
       description APP-SERVERS default gateway
       ip address 10.30.0.1 255.255.255.0
       no shutdown
      !
      interface Vlan40
       description DB-SERVERS default gateway
       ip address 10.40.0.1 255.255.255.0
       no shutdown
      !
      interface Vlan100
       description NET-MGMT gateway
       ip address 10.100.0.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/0
       description 802.1Q trunk to DIST-1 Ethernet0/0
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,20,30,40,100,999
       switchport nonegotiate
       no shutdown
      !
      interface Ethernet0/1
       description 802.1Q trunk to DIST-2 Ethernet0/0
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,20,30,40,100,999
       switchport nonegotiate
       no shutdown
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      end
