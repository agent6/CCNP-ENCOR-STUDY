    VLANs: 10 ENG, 20 FIN, 30 APP, 40 DB, 100 MGMT, 999 native blackhole
    Intentional defects: DIST-2 server trunk missing VLAN 40; SRV-ACCESS native VLAN mismatch; ACCESS-2 dynamic desirable uplink
  text_font: sans-serif
