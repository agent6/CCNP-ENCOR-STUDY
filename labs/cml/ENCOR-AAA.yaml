       description Management VLAN 81 via SW-MGMT
       ip address 10.81.81.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description Application server LAN
       ip address 10.91.91.1 255.255.255.0
       no shutdown
      !
      interface Loopback0
       description Device identity
       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      ! AAA users, aaa new-model, method lists, SSH keys, TACACS+, and authorization are intentionally absent.
      ! Configure AAA authentication and authorization during the lab.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      line vty 5 15
       login
      !
      end
