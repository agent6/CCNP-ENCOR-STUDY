- boot_disk_size: 
  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname admin-pc
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.81.81.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.81.81.1
      mkdir -p /root/aaa-tests
      cat > /root/aaa-tests/targets.txt <<'EOF'
      R1-AAA: 10.81.81.1
      R2-JUMP: 10.81.81.2
      AAA-SERVER placeholder: 10.81.81.20
      Local fallback user after lab config: aaa-admin / AaaAdmin123!
      EOF

      echo "admin-pc" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       admin-pc localhost
      ::1             localhost
      EOF
