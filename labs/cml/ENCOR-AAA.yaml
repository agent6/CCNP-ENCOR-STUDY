- boot_disk_size: 
  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname aaa-server
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.81.81.20/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.81.81.1
      mkdir -p /root/aaa-server
      cat > /root/aaa-server/README.txt <<'EOF'
      This node is a reachable AAA server placeholder for ENCOR 5.1.b.
      The base lab intentionally does not run TACACS+ or RADIUS.
      Configure R1-AAA to try TACACS+ here, then verify local fallback behavior.
      In a production extension, point the same method lists at ISE or another TACACS+/RADIUS service.
      EOF

      echo "aaa-server" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       aaa-server localhost
      ::1             localhost
      EOF
