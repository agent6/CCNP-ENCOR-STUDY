      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname SW-MGMT
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      !
      vlan 81
       name AAA-MGMT
      !
      interface Ethernet0/0
       description R1-AAA management
       switchport mode access
       switchport access vlan 81
       spanning-tree portfast
       no shutdown
      !
      interface Ethernet0/1
       description R2-JUMP management
       switchport mode access
       switchport access vlan 81
       spanning-tree portfast
       no shutdown
      !
      interface Ethernet0/2
       description ADMIN-PC management
       switchport mode access
       switchport access vlan 81
       spanning-tree portfast
       no shutdown
      !
      interface Ethernet0/3
       description AAA-SERVER management
       switchport mode access
       switchport access vlan 81
       spanning-tree portfast
       no shutdown
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      end
