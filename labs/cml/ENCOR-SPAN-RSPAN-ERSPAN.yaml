  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname SW1-ACCESS
      !
      no logging console
      no aaa new-model
      ip cef
      !
      vlan 10
       name CLIENT-DATA
      vlan 999
       name RSPAN-CAPTURE
      !
      interface Ethernet0/0
       description CLIENT access source port
       switchport mode access
       switchport access vlan 10
       spanning-tree portfast
       no shutdown
      !
      interface Ethernet0/1
       description Trunk to SW2-ANALYZER Ethernet0/0
       switchport trunk encapsulation dot1q
       switchport mode trunk
       switchport trunk allowed vlan 10
       no shutdown
      !
      interface Ethernet0/2
       description Client gateway access port to R1-EDGE Ethernet0/0
       switchport mode access
       switchport access vlan 10
       no shutdown
      !
      interface Ethernet0/3
       description Local SPAN destination to LOCAL-ANALYZER for Task 2
       switchport mode access
       switchport access vlan 10
       no shutdown
      !
      ! Monitoring sessions are intentionally absent. Configure SPAN/RSPAN during the lab.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
