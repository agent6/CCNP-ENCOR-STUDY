  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname HQ-RTR
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      ipv6 unicast-routing
      !
      interface Ethernet0/0
       description Transit to DC-RTR Ethernet0/0
       ip address 172.16.0.1 255.255.255.252
       no shutdown
      !
      interface Ethernet0/1
       description CORP LAN - students move to VRF CORP
       ip address 10.10.0.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/2
       description GUEST LAN - students move to VRF GUEST
       ip address 10.20.0.1 255.255.255.0
       no shutdown
      !
      ip route 10.30.0.0 255.255.255.0 172.16.0.2
      ip route 10.40.0.0 255.255.255.0 172.16.0.2
      ip route 10.100.0.10 255.255.255.255 172.16.0.2
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
