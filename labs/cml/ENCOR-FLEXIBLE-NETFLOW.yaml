  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1-EDGE
      !
      no logging console
      no aaa new-model
      ip cef
      !
      interface Ethernet0/0
       description Inside client LAN
       ip address 10.10.10.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description WAN link to R2-WAN Ethernet0/0
       ip address 10.0.12.1 255.255.255.252
       no shutdown
      !
      interface Ethernet0/2
       description NetFlow collector LAN
       ip address 10.50.50.1 255.255.255.0
       no shutdown
      !
      interface Loopback0
       description Router identity
       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      ip route 10.20.20.0 255.255.255.0 10.0.12.2
      !
      ! Flexible NetFlow is intentionally absent. Configure it during the lab.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
