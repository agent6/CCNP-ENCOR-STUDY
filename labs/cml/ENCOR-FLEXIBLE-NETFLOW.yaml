- boot_disk_size: 
  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname collector
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.50.50.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.50.50.1
      mkdir -p /var/log/netflow
      (while true; do nc -ul -p 2055 >> /var/log/netflow/udp-2055.log; done) &


      echo "collector" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       collector localhost
      ::1             localhost
      EOF
