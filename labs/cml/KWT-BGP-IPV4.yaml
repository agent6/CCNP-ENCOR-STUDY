  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1
      !
      no banner motd
      no banner login
      no banner exec
      no banner incoming
      no ip domain-lookup
      ip cef
      !
      interface Ethernet0/0
