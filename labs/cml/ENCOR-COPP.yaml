- boot_disk_size: 
  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname admin-pc
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.10.10.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.10.10.1

      echo "admin-pc" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       admin-pc localhost
      ::1             localhost
      EOF
