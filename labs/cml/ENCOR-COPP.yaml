nodes:
- boot_disk_size: 
  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1-EDGE
      !
      no logging console
      no aaa new-model
      ip cef
      ip domain name encor.local
      username admin privilege 15 secret Admin123!
      crypto key generate rsa general-keys modulus 2048
      ip ssh version 2
      !
      interface Ethernet0/0
       description 802.1Q trunk to SW-ACCESS Ethernet0/0
       no ip address
       no shutdown
      !
      interface Ethernet0/0.10
       description ADMIN-PC VLAN 10 gateway
       encapsulation dot1Q 10
       ip address 10.10.10.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/0.20
       description ATTACK-PC VLAN 20 gateway
       encapsulation dot1Q 20
       ip address 10.10.20.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description OSPF transit to R2-WAN Ethernet0/0
       ip address 10.12.12.1 255.255.255.252
       ip ospf network point-to-point
       no shutdown
      !
      interface Ethernet0/2
       description APP-SERVER LAN
       ip address 10.30.30.1 255.255.255.0
       no shutdown
      !
      interface Loopback0
       description R1 control-plane test address
       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      router ospf 100
       router-id 1.1.1.1
       passive-interface default
       no passive-interface Ethernet0/1
       network 1.1.1.1 0.0.0.0 area 0
       network 10.10.10.0 0.0.0.255 area 0
       network 10.10.20.0 0.0.0.255 area 0
       network 10.12.12.0 0.0.0.3 area 0
       network 10.30.30.0 0.0.0.255 area 0
      !
      ! CoPP class maps, policy maps, and control-plane service policy are intentionally absent.
      ! Configure and verify CoPP during the lab.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login local
       transport input ssh
      !
      end
