  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1
      !
      no banner motd
      no banner login
      no banner exec
      no banner incoming
      no ip domain-lookup
      ip cef
      !
      interface Loopback0
       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      interface Ethernet0/0
       description R1 LAN to SW-R1-LAN Ethernet0/0
       ip address 10.1.1.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description Area 0 transit to R2 Ethernet0/0
       ip address 172.16.1.1 255.255.255.252
       no shutdown
      !
      interface Ethernet0/2
       description Unused
       shutdown
      !
      interface Ethernet0/3
       description Unused
       shutdown
      !
      line con 0
       logging synchronous
       exec-timeout 0 0
      !
      line vty 0 15
       password cisco
       login
       exec-timeout 0 0
      !
      end
