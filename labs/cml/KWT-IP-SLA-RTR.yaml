lab:
  description: IP SLA Response Time Reporter lab using two IOL routers and two IOL-L2
    LAN switches. R2 becomes the responder and R1 runs UDP jitter operation 1.
  notes: Configure IP SLA responder on R2. On R1, create UDP jitter to 203.0.113.2
    port 16384 with G.729A codec-size 20, ToS 184, frequency 5, and life forever.
  title: KWT-IP-SLA-RTR
  version: 0.3.0
