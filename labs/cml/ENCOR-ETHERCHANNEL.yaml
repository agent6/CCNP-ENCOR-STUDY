- border_color: "#00000000"
  border_style: ''
  color: "#263946"
  rotation: 0
  text_bold: false
  text_content: |-
    Bundles: Po1 DIST-1<->DIST-2 (LACP), Po11 DIST-1<->ACCESS-1 (PAgP), Po12 DIST-2<->ACCESS-2 (LACP)
    Intentional defects: Po11 PAgP auto/auto never forms; Po12 mode on vs LACP active; DIST-2 Et0/1 allowed VLAN list mismatch suspends the member
  text_font: sans-serif
  text_italic: false
  text_size: 14
  text_unit: pt
  thickness: 1
  type: text
  x1: -610.0
  y1: -455.0
  z_index: 2
smart_annotations: []
nodes:
- boot_disk_size: 
  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname DIST-1
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      vtp mode transparent
      !
      spanning-tree mode rapid-pvst
      spanning-tree extend system-id
      !
      vlan 10
       name USERS
      vlan 30
       name SERVERS
      vlan 100
       name NET-MGMT
      vlan 999
       name NATIVE-BLACKHOLE
      !
      interface Port-channel1
       description LACP peer bundle to DIST-2
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,30,100,999
      !
      interface Port-channel11
       description PAgP bundle to ACCESS-1
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,100,999
      !
      interface Ethernet0/0
       description Po1 member to DIST-2 Ethernet0/0
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,30,100,999
       channel-group 1 mode active
       no shutdown
      !
      interface Ethernet0/1
       description Po1 member to DIST-2 Ethernet0/1
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,30,100,999
       channel-group 1 mode active
       no shutdown
      !
      interface Ethernet0/2
       description Po11 member to ACCESS-1 Ethernet0/0
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,100,999
       channel-group 11 mode auto
       no shutdown
      !
      interface Ethernet0/3
       description Po11 member to ACCESS-1 Ethernet0/1
       switchport mode trunk
       switchport trunk native vlan 999
       switchport trunk allowed vlan 10,100,999
       channel-group 11 mode auto
       no shutdown
      !
      interface Vlan100
       description NET-MGMT
       ip address 10.100.0.11 255.255.255.0
       no shutdown
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      end
