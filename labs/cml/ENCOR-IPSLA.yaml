  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1-BRANCH
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      !
      interface Ethernet0/0
       description Client LAN
       ip address 10.10.10.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description Primary path to R2-PRIMARY Ethernet0/0
       ip address 10.0.12.1 255.255.255.252
       no shutdown
      !
      interface Ethernet0/2
       description Backup path to R3-BACKUP Ethernet0/0
       ip address 10.0.13.1 255.255.255.252
       no shutdown
      !
      interface Loopback0
       description Branch identity
       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      ip route 10.20.20.0 255.255.255.0 10.0.12.2
      !
      ! IP SLA operations, object tracking, and floating backup route are intentionally absent.
      ! Configure them during the lab.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
