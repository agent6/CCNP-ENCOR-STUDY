- boot_disk_size: 
  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname hq-user
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.10.10.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.10.10.1

      echo "hq-user" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       hq-user localhost
      ::1             localhost
      EOF
