       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      interface Ethernet0/0
       description Link to R1 Ethernet0/0
       ip address 192.0.2.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description Unused
       shutdown
      !
      interface Ethernet0/2
       description Unused
       shutdown
      !
      interface Ethernet0/3
       description Unused
       shutdown
      !
      router ospf 1
       router-id 1.1.1.1
       network 192.0.2.0 0.0.0.255 area 0
       network 1.1.1.1 0.0.0.0 area 0
      !
      line con 0
       logging synchronous
       exec-timeout 0 0
      !
      line vty 0 15
       password cisco
       login
       exec-timeout 0 0
      !
