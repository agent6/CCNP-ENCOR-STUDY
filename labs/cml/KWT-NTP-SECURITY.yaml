    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname INTERNET
      !
      no banner motd
      no banner login
      no banner exec
      no banner incoming
      no ip domain-lookup
      ip cef
      ip http server
