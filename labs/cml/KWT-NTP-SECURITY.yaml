  description: NTP Security lab using two IOL routers. R1 synchronizes to the INTERNET
    router loopback, then secures the relationship with NTP authentication and access
    groups.
  notes: Starting state intentionally includes IP reachability and OSPF only. Configure
    the NTP master, NTP client, MD5 key, trusted key, keyed server statement, serve-only
    ACL, and peer ACL during the lab.
