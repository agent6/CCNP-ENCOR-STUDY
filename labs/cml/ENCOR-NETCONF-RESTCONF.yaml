      # this is a shell script which will be sourced at boot
      hostname app-server
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.70.70.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.70.70.1
      mkdir -p /www
      echo "netconf-restconf-app-server" > /www/index.html
      /usr/sbin/httpd -f -p 80 -h /www >/tmp/httpd.log 2>&1 &

      echo "app-server" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       app-server localhost
      ::1             localhost
      EOF
