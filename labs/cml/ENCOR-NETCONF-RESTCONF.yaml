- boot_disk_size: 
  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname automation
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.60.60.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.60.60.1
      mkdir -p /root/encor-api
      cat > /root/encor-api/loopback100-native.json <<'EOF'
      {
        "Cisco-IOS-XE-native:Loopback": {
          "name": 100,
          "description": "Created by RESTCONF for ENCOR 4.6",
          "ip": {
            "address": {
              "primary": {
                "address": "100.100.100.1",
                "mask": "255.255.255.255"
              }
            }
          }
        }
      }
      EOF
      cat > /root/encor-api/netconf-close-session.xml <<'EOF'
      <rpc message-id="101" xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
        <close-session/>
      </rpc>]]>]]>
      EOF
      cat > /root/encor-api/notes.txt <<'EOF'
      R1-MANAGED: 10.60.60.1
      User: automation
      Password: Cisco123!
      NETCONF: TCP/830 after netconf-yang is enabled
      RESTCONF: HTTPS/443 after ip http secure-server and restconf are enabled
      EOF

      echo "automation" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       automation localhost
      ::1             localhost
      EOF
