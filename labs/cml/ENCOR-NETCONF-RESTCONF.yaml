nodes:
- boot_disk_size: 
  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1-MANAGED
      !
      no logging console
      no aaa new-model
      ip cef
      !
      username automation privilege 15 secret Cisco123!
      enable secret Cisco123!
      ip domain name encor.local
      ip ssh version 2
      !
      interface Ethernet0/0
       description Management network to AUTOMATION
       ip address 10.60.60.1 255.255.255.0
       no shutdown
      !
      interface Ethernet0/1
       description Application server LAN
       ip address 10.70.70.1 255.255.255.0
       no shutdown
      !
      interface Loopback0
       description Device identity
       ip address 1.1.1.1 255.255.255.255
       no shutdown
      !
      ! NETCONF, RESTCONF, HTTPS, AAA new-model, and RSA keys are intentionally absent.
      ! Configure model-driven management during the lab.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login local
       transport input ssh
      !
      end
