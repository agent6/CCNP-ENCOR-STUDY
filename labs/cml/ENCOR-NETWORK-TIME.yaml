       no shutdown
      !
      interface Loopback0
       description Branch router identity
       ip address 10.33.255.3 255.255.255.255
       no shutdown
      !
      ip route 0.0.0.0 0.0.0.0 10.33.23.1
      !
      ntp source Ethernet0/0
      ntp authenticate
      ntp authentication-key 20 md5 WrongTimeKey
      ntp trusted-key 20
      ntp server 10.33.23.1 key 20
      ! Intentional defect: R2-DIST serves authenticated NTP with key 10, not key 20.
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
