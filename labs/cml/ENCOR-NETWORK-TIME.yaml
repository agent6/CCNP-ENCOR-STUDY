      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname SW1-ACCESS
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      clock timezone UTC 0 0
      !
      vlan 33
       name MGMT-TIME
      !
      interface Ethernet0/0
       description Access link to R2-DIST Ethernet0/2
       switchport mode access
       switchport access vlan 33
       no shutdown
      !
      interface Ethernet0/1
       description Access link to SW2-ACCESS Ethernet0/0 - PTP interpretation segment
       switchport mode access
       switchport access vlan 33
       no shutdown
      !
      interface Vlan33
       description Management SVI for NTP source
       ip address 10.33.33.11 255.255.255.0
       no shutdown
      !
      ip default-gateway 10.33.33.1
      !
      ntp source Vlan33
      ntp authenticate
      ntp authentication-key 10 md5 C1sc0Time
      ntp trusted-key 10
      ntp server 10.33.33.1 key 10
      !
      banner exec ^
      PTP interpretation excerpt for SW1-ACCESS:
      ptp mode e2etransparent
      ptp domain 0
      interface TenGigabitEthernet1/0/1
       ptp enable
      show ptp clock: Clock Type End-to-End Transparent Clock, Domain 0, State Forwarding
      ^
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
