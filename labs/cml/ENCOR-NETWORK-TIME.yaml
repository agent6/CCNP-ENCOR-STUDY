  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1-TIME
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      ip cef
      clock timezone UTC 0 0
      !
      interface Ethernet0/0
       description Routed link to R2-DIST Ethernet0/0
       ip address 10.33.12.1 255.255.255.252
       no shutdown
      !
      interface Loopback0
       description Stable NTP source identity
       ip address 10.33.255.1 255.255.255.255
       no shutdown
      !
      ip access-list standard NTP-CLIENTS
       permit 10.33.12.2
       deny any log
      !
      ntp source Ethernet0/0
      ntp master 2
      ntp authenticate
      ntp authentication-key 10 md5 C1sc0Time
      ntp trusted-key 10
      ntp access-group serve-only NTP-CLIENTS
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
