      !
      banner exec ^
      PTP interpretation excerpt for SW2-ACCESS:
      ptp mode boundary
      ptp domain 24
      ptp priority1 128
      ptp priority2 128
      show ptp parent: Parent Clock 00:00:00:00:00:00:00:00, Port State Listening, Last Announce Received never
      ^
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      line vty 0 4
       login
      !
      end
