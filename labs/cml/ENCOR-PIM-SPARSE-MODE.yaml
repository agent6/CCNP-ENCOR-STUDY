- border_color: "#00000000"
  border_style: ''
  color: "#263946"
  rotation: 0
  text_bold: false
  text_content: |-
    RP = R2 Loopback0 (10.0.2.2, static on all routers). Group 239.1.1.1. R3 starts with spt-threshold infinity (RPT via R2); SPT path is via R4.
    Intentional defect: R4 Ethernet0/1 toward R1 has no ip pim sparse-mode - SPT switchover fails until it is enabled.
  text_font: sans-serif
  text_italic: false
  text_size: 14
  text_unit: pt
  thickness: 1
  type: text
  x1: -610.0
  y1: -455.0
