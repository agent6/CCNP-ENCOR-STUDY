  configuration:
  - name: ios_config.txt
    content: |
      !
      version 17.16
      service timestamps debug datetime msec
      service timestamps log datetime msec
      no service password-encryption
      !
      hostname R1
      !
      no logging console
      no aaa new-model
      no ip domain-lookup
      !
      ip multicast-routing distributed
      !
      interface Loopback0
       ip address 10.0.1.1 255.255.255.255
       ip pim sparse-mode
      !
      interface Ethernet0/0
       description Link to R2 (RP)
       ip address 10.0.12.1 255.255.255.0
       ip pim sparse-mode
       no shutdown
      !
      interface Ethernet0/1
       description Link to R4
       ip address 10.0.14.1 255.255.255.0
       ip pim sparse-mode
       no shutdown
      !
      interface Ethernet0/2
       description Source LAN (SRC 10.1.1.10)
       ip address 10.1.1.1 255.255.255.0
       ip pim sparse-mode
       no shutdown
      !
      router ospf 1
       router-id 10.0.1.1
       network 10.0.0.0 0.255.255.255 area 0
      !
      ip pim rp-address 10.0.2.2
      !
      line con 0
       exec-timeout 0 0
       logging synchronous
      !
      end
