  configuration:
  - name: node.cfg
    content: |-
      # this is a shell script which will be sourced at boot
      hostname src
      USERNAME=cisco
      PASSWORD=cisco

      ip address add 10.1.1.10/24 dev eth0
      ip link set dev eth0 up
      ip route add default via 10.1.1.1

      echo "src" > /etc/hostname
      cat <<EOF > /etc/hosts
      127.0.0.1       src localhost
      ::1             localhost
      EOF
